id: yarn-weight
version: "1.0"
description: Yarn weight categories. Source — Ravelry API + Craft Yarn Council standards.

values:
  - key: thread
    label: { en: Thread, de: Nähgarn, es: Hilo, fr: Fil }
    aliases: ["sewing thread", "crochet thread", "size 10"]
    meta: { wpi_range: [35, null] }

  - key: cobweb
    label: { en: Cobweb, de: Cobweb, es: Cobweb, fr: Cobweb }
    aliases: ["0-ply", "cobweb lace", "1-ply"]
    meta: { wpi_range: [25, 34] }

