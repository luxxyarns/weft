    label: { en: Lace, de: Lace, es: Encaje, fr: Dentelle }
    aliases: ["2ply", "2-ply", "lace weight"]
    meta: { ply: 2, wpi_range: [18, 24] }

  - key: light-fingering
    label: { en: Light Fingering, de: Light Fingering, es: Light Fingering, fr: Light Fingering }
    aliases: ["3ply", "3-ply"]
