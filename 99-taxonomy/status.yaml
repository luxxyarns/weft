id: status
version: "1.0"
description: Status values for materials and projects

material_status:
  - key: in-stash
    label: { en: In Stash, de: Im Vorrat, es: En reserva, fr: En stock }
    aliases: ["active", "available"]

  - key: allocated
    label: { en: Allocated, de: Zugeordnet, es: Asignado, fr: Attribué }
    aliases: ["assigned", "reserved"]

  - key: in-use
    label: { en: In Use, de: In Verwendung, es: En uso, fr: En cours }
    aliases: ["in progress"]

  - key: used-up
    label: { en: Used Up, de: Aufgebraucht, es: Agotado, fr: Utilisé }
    aliases: ["finished", "consumed"]

  - key: gifted
    label: { en: Gifted, de: Verschenkt, es: Regalado, fr: Offert }

  - key: sold
    label: { en: Sold, de: Verkauft, es: Vendido, fr: Vendu }
    aliases: ["traded", "will trade/sell", "gone/sold"]

  - key: returned
    label: { en: Returned, de: Zurückgegeben, es: Devuelto, fr: Retourné }

  - key: frogged
    label: { en: Frogged, de: Aufgeribbelt, es: Deshecho, fr: Détricoté }
    aliases: ["reclaimed", "ripped back"]

  - key: other
    label: { en: Other, de: Sonstiges, es: Otro, fr: Autre }

project_status:
  - key: planned
    label: { en: Planned, de: Geplant, es: Planeado, fr: Planifié }
    aliases: ["queued", "in queue"]

  - key: in-progress
    label: { en: In Progress, de: In Arbeit, es: En curso, fr: En cours }
    aliases: ["wip", "on the needles", "active"]

  - key: finished
    label: { en: Finished, de: Fertig, es: Terminado, fr: Terminé }
    aliases: ["completed", "done", "fo"]

  - key: hibernating
    label: { en: Hibernating, de: Pausiert, es: Hibernando, fr: En pause }
    aliases: ["on hold", "paused", "resting"]

  - key: frogged
    label: { en: Frogged, de: Aufgeribbelt, es: Deshecho, fr: Détricoté }
    aliases: ["ripped out", "unraveled"]

  - key: gifted
    label: { en: Gifted, de: Verschenkt, es: Regalado, fr: Offert }

  - key: other
    label: { en: Other, de: Sonstiges, es: Otro, fr: Autre }
